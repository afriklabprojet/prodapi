##############################################################
# DR-PHARMA — Nginx site configuration
# Chemin sur le VPS : /etc/nginx/sites-available/drpharma
# Activer : ln -s /etc/nginx/sites-available/drpharma /etc/nginx/sites-enabled/
##############################################################

server {
    listen 80;
    listen [::]:80;
    server_name drlpharma.pro www.drlpharma.pro;

    # Rediriger vers HTTPS (Certbot ajoutera le bloc 443 automatiquement)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name drlpharma.pro www.drlpharma.pro;

    root /var/www/drpharma/public;
    index index.php;

    # SSL — géré par Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/drlpharma.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drlpharma.pro/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité — X-Frame-Options et X-Content-Type-Options gérés par Laravel (middleware)
    # On garde uniquement les headers non définis par l'appli
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=()" always;

    # Logs
    access_log /var/log/nginx/drpharma_access.log;
    error_log  /var/log/nginx/drpharma_error.log;

    # Upload max (prescriptions, documents)
    client_max_body_size 20M;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Assets statiques avec cache long
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel : toutes les requêtes vers index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   $realpath_root;
        fastcgi_read_timeout 120;
    }

    # Bloquer les fichiers sensibles
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(env|log|json|lock|yaml|yml|bak|sh)$ {
        deny all;
    }
}
