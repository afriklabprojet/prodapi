# Log rotation config for DrPharma application
# Install: sudo cp deploy/logrotate_drpharma.conf /etc/logrotate.d/drpharma
# Test: sudo logrotate -d /etc/logrotate.d/drpharma

# Laravel application logs
/var/www/drpharma/storage/logs/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 www-data www-data
    sharedscripts
    postrotate
        # Optionnel: notifier Laravel de la rotation
        /usr/bin/php /var/www/drpharma/artisan log:clear --quiet 2>/dev/null || true
    endscript
}

# Nginx access logs
/var/log/nginx/drpharma_access.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid)
    endscript
}

# Nginx error logs
/var/log/nginx/drpharma_error.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid)
    endscript
}

# PHP-FPM logs
/var/log/php*-fpm.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 www-data www-data
    sharedscripts
    postrotate
        [ -f /var/run/php-fpm.pid ] && kill -USR1 $(cat /var/run/php-fpm.pid) 2>/dev/null || true
    endscript
}

# Supervisor logs
/var/log/supervisor/*.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    create 0640 root root
}

# Queue worker logs (si stockés séparément)
/var/www/drpharma/storage/logs/worker*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 0640 www-data www-data
}
