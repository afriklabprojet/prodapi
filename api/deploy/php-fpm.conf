;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; DR-PHARMA — PHP-FPM pool
; Chemin sur le VPS : /etc/php/8.2/fpm/pool.d/drpharma.conf
; (remplacer le pool www par défaut ou cohabiter)
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[drpharma]

; Utilisateur dédié (créé dans server-setup.sh)
user  = drpharma
group = drpharma

; Socket Unix (plus rapide qu'un port TCP)
listen = /run/php/php8.2-fpm-drpharma.sock
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; Gestion des workers
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Timeouts
request_terminate_timeout = 120
request_slowlog_timeout   = 10s
slowlog = /var/log/php/drpharma_slow.log

; Variables d'environnement PHP
php_admin_value[memory_limit]       = 256M
php_admin_value[upload_max_filesize] = 20M
php_admin_value[post_max_size]       = 22M
php_admin_value[max_execution_time]  = 120
php_admin_value[error_log]           = /var/log/php/drpharma_error.log
php_admin_flag[log_errors]           = on
php_admin_flag[display_errors]       = off

; Sécurité
php_admin_value[open_basedir] = /var/www/drpharma:/tmp
php_admin_flag[allow_url_fopen] = off

; OPcache (activer dans php.ini si pas déjà fait)
php_admin_value[opcache.memory_consumption]    = 128
php_admin_value[opcache.max_accelerated_files] = 10000
php_admin_value[opcache.validate_timestamps]   = 0
