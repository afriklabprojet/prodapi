# ============================================================
# DR-PHARMA — Configuration Cron pour backups automatiques
# ============================================================
# Installation:
#   sudo cp deploy/cron_backup.conf /etc/cron.d/drpharma-backup
#   sudo chmod 644 /etc/cron.d/drpharma-backup
# ============================================================

# Backup quotidien à 2h du matin
0 2 * * * root /var/www/drpharma/scripts/backup_database.sh >> /var/log/drpharma-backup.log 2>&1

# Backup supplémentaire le dimanche à 4h (weekly full backup)
0 4 * * 0 root RETENTION_DAYS=90 /var/www/drpharma/scripts/backup_database.sh >> /var/log/drpharma-backup.log 2>&1
