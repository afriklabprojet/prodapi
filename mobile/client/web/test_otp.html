<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Firebase OTP - DR-PHARMA</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
    }

    .container {
      background: #f5f5f5;
      padding: 30px;
      border-radius: 10px;
    }

    h1 {
      color: #2196F3;
      text-align: center;
    }

    input,
    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #2196F3;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1976D2;
    }

    button:disabled {
      background: #ccc;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 5px;
      white-space: pre-wrap;
    }

    .success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .error {
      background: #ffebee;
      color: #c62828;
    }

    .info {
      background: #e3f2fd;
      color: #1565c0;
    }

    #recaptcha-container {
      margin: 15px 0;
    }

    .step {
      margin: 20px 0;
      padding: 15px;
      background: white;
      border-radius: 5px;
    }

    .step h3 {
      margin-top: 0;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🔐 Test OTP Firebase</h1>
    <p style="text-align: center; color: #666;">DR-PHARMA - Vérification SMS</p>

    <div class="step">
      <h3>Étape 1: Envoyer le code SMS</h3>
      <input type="tel" id="phoneInput" placeholder="Numéro (ex: 0777019185)" value="0777019185">
      <button id="sendBtn">📱 Envoyer le code SMS</button>
    </div>

    <div class="step" id="verifyStep" style="display: none;">
      <h3>Étape 2: Vérifier le code</h3>
      <input type="text" id="otpInput" placeholder="Code à 6 chiffres" maxlength="6">
      <button onclick="verifyOTP()">✅ Vérifier le code</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    // Configuration Firebase DR-PHARMA
    const firebaseConfig = {
      apiKey: "AIzaSyBPZofVvi1nLpXQxp-bI5sHc1UiRG6_EeM",
      authDomain: "dr-pharma-6027d.firebaseapp.com",
      projectId: "dr-pharma-6027d",
      storageBucket: "dr-pharma-6027d.firebasestorage.app",
      messagingSenderId: "549879846840",
      appId: "1:549879846840:web:8bcb09cae3bb849d58614d"
    };

    // Initialiser Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Configuration de la langue
    auth.languageCode = 'fr';

    let confirmationResult = null;
    let recaptchaVerifier = null;

    function showResult(message, type) {
      const result = document.getElementById('result');
      result.className = type;
      result.innerHTML = message;
    }

    // Initialiser reCAPTCHA
    function initRecaptcha() {
      if (recaptchaVerifier) {
        recaptchaVerifier.clear();
      }

      recaptchaVerifier = new firebase.auth.RecaptchaVerifier('sendBtn', {
        size: 'invisible',
        callback: (response) => {
          console.log('reCAPTCHA résolu automatiquement');
        },
        'expired-callback': () => {
          console.log('reCAPTCHA expiré');
          showResult('⚠️ reCAPTCHA expiré. Rechargez la page.', 'error');
        }
      });

      console.log('reCAPTCHA invisible initialisé');
      showResult('✅ Prêt à envoyer. Entrez le numéro et cliquez sur Envoyer.', 'success');
    }

    // Formater le numéro en international E.164
    // Côte d'Ivoire: +225 suivi de 10 chiffres (depuis 2021)
    function formatPhoneNumber(phone) {
      phone = phone.replace(/\s/g, '').replace(/-/g, '');

      // Si déjà en format international complet
      if (phone.startsWith('00225')) {
        return '+' + phone.substring(2); // +2250777019185
      } else if (phone.startsWith('+225')) {
        return phone;
      } else if (phone.startsWith('225') && phone.length >= 13) {
        return '+' + phone;
      } else if (phone.length === 10 && phone.startsWith('0')) {
        // Numéro local CI avec 0 initial (10 chiffres)
        return '+225' + phone; // +2250777019185
      } else if (phone.length === 10) {
        return '+225' + phone;
      } else {
        return '+225' + phone;
      }
    }

    // Envoyer OTP
    async function sendOTP() {
      const phoneInput = document.getElementById('phoneInput').value;
      const phoneNumber = formatPhoneNumber(phoneInput);

      showResult('📤 Envoi du code vers ' + phoneNumber + '...', 'info');
      document.getElementById('sendBtn').disabled = true;

      try {
        confirmationResult = await auth.signInWithPhoneNumber(phoneNumber, recaptchaVerifier);

        showResult('✅ Code envoyé avec succès!\n\n📱 Vérifiez vos SMS sur ' + phoneNumber, 'success');
        document.getElementById('verifyStep').style.display = 'block';
        document.getElementById('otpInput').focus();

      } catch (error) {
        console.error('Erreur envoi OTP:', error);
        let errorMsg = '❌ Erreur: ' + error.message;

        if (error.code === 'auth/invalid-phone-number') {
          errorMsg = '❌ Numéro de téléphone invalide';
        } else if (error.code === 'auth/too-many-requests') {
          errorMsg = '❌ Trop de tentatives. Attendez quelques minutes.';
        } else if (error.code === 'auth/captcha-check-failed') {
          errorMsg = '❌ Erreur reCAPTCHA. Rechargez la page.';
        }

        showResult(errorMsg + '\n\nCode: ' + error.code, 'error');
        initRecaptcha(); // Réinitialiser le captcha
      }
    }

    // Vérifier OTP
    async function verifyOTP() {
      const code = document.getElementById('otpInput').value;

      if (!code || code.length !== 6) {
        showResult('⚠️ Entrez un code à 6 chiffres', 'error');
        return;
      }

      showResult('🔄 Vérification du code...', 'info');

      try {
        const result = await confirmationResult.confirm(code);
        const user = result.user;

        showResult(
          '🎉 SUCCÈS! Authentification réussie!\n\n' +
          '👤 UID: ' + user.uid + '\n' +
          '📱 Téléphone: ' + user.phoneNumber + '\n' +
          '🕐 Créé: ' + user.metadata.creationTime,
          'success'
        );

        console.log('Utilisateur connecté:', user);

      } catch (error) {
        console.error('Erreur vérification:', error);
        let errorMsg = '❌ Code invalide';

        if (error.code === 'auth/invalid-verification-code') {
          errorMsg = '❌ Code de vérification incorrect';
        } else if (error.code === 'auth/code-expired') {
          errorMsg = '❌ Code expiré. Demandez un nouveau code.';
        }

        showResult(errorMsg, 'error');
      }
    }

    // Initialiser au chargement
    window.onload = function () {
      console.log('Firebase initialisé pour:', firebaseConfig.projectId);
      showResult('🔄 Initialisation...', 'info');
      initRecaptcha();

      // Ajouter l'événement au bouton
      document.getElementById('sendBtn').addEventListener('click', sendOTP);
    };

    // Permettre l'envoi avec Enter
    document.getElementById('phoneInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') sendOTP();
    });
    document.getElementById('otpInput')?.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') verifyOTP();
    });
  </script>
</body>

</html>
