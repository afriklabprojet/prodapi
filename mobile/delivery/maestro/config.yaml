# Configuration Maestro pour DR Pharma Delivery
# https://maestro.mobile.dev/reference/maestro-configuration

# App ID Android
appId: com.drpharma.delivery

# Timeouts par défaut
defaultTimeout: 5000

# Dossier des captures d'écran
screenshotPath: ./screenshots

# Tags pour filtrer les tests
tags:
  - wallet
  - e2e
  - payment

# Variables d'environnement par défaut
env:
  # Compte de test coursier
  TEST_EMAIL: "leadouce0@gmail.com"
  TEST_PASSWORD: "Paris2026"
  
  # Configuration paiement test
  TEST_AMOUNT: "500"
  TEST_PAYMENT_METHOD: "wave"
  
  # URLs
  API_BASE_URL: "https://api.drpharma.ci"

# Hooks
onFlowStart:
  - clearState: false

onFlowComplete:
  - takeScreenshot: "flow_completed"

# Configuration CI/CD
ci:
  retries: 2
  parallel: false
